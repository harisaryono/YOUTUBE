# Orchestrator Configuration
# Profile: safe | normal | fast
profile: safe

loop:
  # Minimum sleep between cycles (seconds)
  min_sleep_seconds: 5
  # Sleep when no jobs found (seconds)
  idle_sleep_seconds: 900
  # Sleep after errors (seconds)
  error_sleep_seconds: 1800

orchestrator:
  # Work-conserving: keep scheduling while safe work remains.
  mode: work_conserving
  # Maximum stage batches per cycle when caller does not override.
  max_jobs_per_cycle: 7
  # Maximum jobs that may run concurrently in one cycle.
  max_parallel_jobs: 3
  # Parallel slots by stage group to avoid stacking YouTube-sensitive jobs.
  parallel_groups:
    discovery: 1
    youtube: 1
    local: 2
    provider: 1
  # Sleep when there is still runnable work.
  short_sleep_seconds: 5
  # Sleep when all work is currently blocked or exhausted.
  idle_sleep_seconds: 900
  # If YouTube backlog crosses this count, YouTube-sensitive stages are boosted.
  youtube_backlog_boost_threshold: 500

parallel:
  enabled: true
  # Global rem so the server is not overloaded.
  max_total_jobs: 9
  groups:
    discovery:
      max_running: 1
      stages:
        - discovery
    youtube:
      max_running: 2
      stages:
        - transcript
    youtube_download:
      max_running: 1
      stages:
        - audio_download
    provider:
      max_running: 3
      stages:
        - resume
        - asr
    local:
      max_running: 2
      stages:
        - format
        - janitor
        - import_pending
  stages:
    discovery:
      slots: 1
      prefer_never_discovered: true
    transcript:
      slots: 2
    audio_download:
      slots: 1
    resume:
      slots: 2
    asr:
      slots: 1
    format:
      slots: 1
    janitor:
      slots: 1

system:
  # Minimum free disk space (GB) before stopping jobs
  min_free_disk_gb: 5
  # Minimum available memory for resume jobs (MB)
  min_memory_mb_resume: 1500
  # Minimum available memory for format jobs (MB)
  min_memory_mb_format: 1200
  # Minimum available memory for ASR jobs (MB)
  min_memory_mb_asr: 2500

# Storage Budget & Lifecycle Guard.
# Prinsip: pipeline tidak boleh diam-diam membengkak.
lifecycle:
  enabled: true
  # Stop audio_download bila sudah terlalu banyak audio lokal yang menunggu ASR.
  max_asr_downloaded_audio_backlog: 200
  block_audio_download_on_asr_backlog: true

  # Budget direktori/file operasional.
  max_runs_dir_gb: 5
  warn_runs_dir_gb: 4
  max_logs_dir_gb: 2
  warn_logs_dir_gb: 1.5
  max_orchestrator_db_gb: 1
  warn_orchestrator_db_gb: 0.8

  # Blocker default: runs/ dan orchestrator DB wajib dikendalikan.
  block_on_runs_over_limit: true
  block_on_logs_over_limit: false
  block_on_orchestrator_db_over_limit: true

timeouts:
  # Default timeout for stages that do not define a custom limit.
  default_seconds: 7200
  discovery_seconds: 1800
  transcript_seconds: 3600
  audio_download_seconds: 3600
  resume_seconds: 7200
  asr_seconds: 7200
  format_seconds: 7200

youtube:
  # How often to re-discover channels (hours)
  discovery_interval_hours: 24
  # Default batch size for transcript jobs
  batch_limit: 100
  # Workers when in safe mode
  safe_transcript_workers: 2
  # Workers when in normal mode
  normal_transcript_workers: 5
  # Cooldown after hard YouTube block (hours)
  hard_block_cooldown_hours: 6
  # Cooldown after bot detection (hours)
  bot_detection_cooldown_hours: 24
  # Max consecutive hard blocks before escalating
  max_consecutive_hard_blocks: 3
  # Delay between video transcript requests (seconds)
  inter_video_delay_min: 8
  inter_video_delay_max: 15

audio_download:
  enabled: true
  batch_limit: 50
  workers: 1
  max_duration_minutes: 60
  yt_dlp_rate_limit_safe: true
  keep_audio_after_asr: false
  audio_dir: "uploads/audio"
  # Hard cap: jangan terus download audio bila ASR macet.
  max_audio_dir_gb: 5
  warn_audio_dir_gb: 4
  stop_when_audio_dir_over_limit: true

resume:
  enabled: true
  max_workers: 4
  batch_limit: 100
  require_lease: true
  # Provider priority: nvidia_first | groq_first | auto
  provider_plan: nvidia_first

format:
  enabled: true
  max_workers: 4
  batch_limit: 500
  # Only run during idle hours (when YouTube stages are paused)
  prefer_idle_hours: true
  idle_hours:
    start: "22:00"
    end: "05:00"

asr:
  # ASR untuk video no_subtitle — aktif
  enabled: true
  provider_plan: groq_first
  groq_model: "whisper-large-v3"
  nvidia_model: "whisper-large-v3-multi-asr-offline"
  max_video_workers: 2
  batch_limit: 20
  max_duration_minutes: 60
  require_local_audio: true
  delete_audio_after_success: true
  require_cached_audio: false
  # Hapus chunk WAV per-video setelah transcript berhasil digabung.
  delete_chunks_after_success: true


report:
  write_markdown: true
  notify_on_blocking: true

adaptive:
  transcript:
    enabled: true
    min_batch: 20
    max_batch: 300
    step: 50
    increase_after_success_batches: 3
    decrease_on_block: true
  audio_download:
    enabled: true
    min_batch: 10
    max_batch: 100
    step: 20
    increase_after_success_batches: 3
    decrease_on_block: true

janitor:
  enabled: true
  interval_minutes: 30
  keep_events_days: 30
  keep_logs_days: 14
  keep_run_dirs_days: 7
  keep_reports_days: 14
  cleanup_audio_orphans: true
  auto_compact_logs: true
  auto_clean_chunks: true
  compact_older_than_hours: 0.5
  chunk_clean_older_than_hours: 2

log_archive:
  enabled: true
  archive_dir: logs/archive
  timezone: Asia/Jakarta
  run_hour: 23
  run_minute: 55
  copy_report_csv: true

  raw_log_retention:
    success_days: 1
    normal_failure_days: 7
    incident_days: 14

  report_retention:
    csv_days: 90

  archive_retention:
    markdown_days: 180
    jsonl_days: 365
    incidents_json_days: 365

  compression:
    enabled: true
    compress_after_days: 1
    delete_original_after_compress: true

  tail_capture:
    success_lines: 20
    normal_failure_lines: 150
    incident_lines: 300

  disk_guard:
    max_runs_dir_gb: 8
    min_free_disk_gb: 3
    emergency_delete_success_logs_first: true

retry_queue:
  enabled: true
  max_per_cycle: 1
  max_attempts_default: 1
  prefer_retry_before_normal: false
{% extends "base.html" %}
{% block title %}Transcript{% endblock %}

{% block content %}
  <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-3">
    <div>
      <div class="h4 mb-1">Transcript</div>
      <div class="text-light-emphasis mono">{{ v.video_id }} • {{ v.title or "" }}</div>
      <div class="small text-light-emphasis mono">{{ path }}</div>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-light" href="{{ url_for('video_detail', video_pk=v.id) }}"><i class="bi bi-arrow-left me-1"></i>Back</a>
      <a class="btn btn-light" href="{{ url_for('video_text', video_pk=v.id, raw=1) }}"><i class="bi bi-download me-1"></i>Raw</a>
    </div>
  </div>

  {% if text_empty %}
  <div class="alert alert-warning">
    Transcript kosong untuk video ini.
  </div>
  {% endif %}

  <pre class="transcript">{{ text }}</pre>
{% endblock %}

{% extends "base.html" %}
{% block title %}Add Channel{% endblock %}

{% block content %}
  <div class="card rounded-4">
    <div class="card-body p-4">
      <div class="d-flex align-items-center justify-content-between mb-3">
        <div>
          <div class="h4 mb-1">Add channel</div>
          <div class="text-light-emphasis">Masukkan URL channel (boleh yang berakhiran <span class="mono">/videos</span> atau tidak).</div>
        </div>
        <a class="btn btn-outline-light" href="{{ url_for('channels') }}"><i class="bi bi-arrow-left me-1"></i>Back</a>
      </div>
      <form method="post" class="row g-3">
        <div class="col-12">
          <label class="form-label">YouTube channel URL</label>
          <input name="url" class="form-control form-control-lg" placeholder="https://www.youtube.com/@FirandaAndirjaOfficial/videos" required>
        </div>
        <div class="col-12 col-md-6">
          <label class="form-label">Category</label>
          <select class="form-select" name="category_id">
            <option value="">(none)</option>
            {% for c in categories %}
              <option value="{{ c.id }}">{{ c.name }}</option>
            {% endfor %}
          </select>
          <div class="form-text text-light-emphasis">Kategori bisa diubah lagi dari daftar channel.</div>
        </div>
        <div class="col-12">
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="start_update" name="start_update" value="1" checked>
            <label class="form-check-label" for="start_update">
              Jalankan update sekarang (background)
            </label>
          </div>
        </div>
        <div class="col-12 d-flex gap-2">
          <button class="btn btn-light btn-lg" type="submit"><i class="bi bi-check2 me-1"></i>Save</button>
          <a class="btn btn-outline-light btn-lg" href="{{ url_for('channels') }}">Cancel</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}

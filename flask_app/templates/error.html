{% extends "base.html" %}

{% block title %}Error - YouTube Transcript Manager{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="text-center py-5">
                <div class="mb-4">
                    <i class="bi bi-exclamation-triangle text-warning" style="font-size: 5rem;"></i>
                </div>
                <h1 class="display-4 fw-bold mb-3">Oops!</h1>
                <h2 class="h4 text-muted mb-4">Something went wrong</h2>
                
                {% if error %}
                <div class="alert alert-warning" role="alert">
                    <i class="bi bi-info-circle me-2"></i>
                    {{ error }}
                </div>
                {% endif %}
                
                <div class="d-flex justify-content-center gap-3 mt-5">
                    <a href="{{ url_for('index') }}" class="btn btn-primary btn-lg">
                        <i class="bi bi-house"></i> Go Home
                    </a>
                    <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg">
                        <i class="bi bi-arrow-left"></i> Go Back
                    </a>
                </div>
                
                <div class="mt-5">
                    <h5>Need help?</h5>
                    <ul class="list-unstyled text-muted">
                        <li><a href="{{ url_for('channels') }}" class="text-decoration-none">Browse Channels</a></li>
                        <li><a href="{{ url_for('videos') }}" class="text-decoration-none">Browse Videos</a></li>
                        <li><a href="{{ url_for('search') }}" class="text-decoration-none">Search Videos</a></li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
